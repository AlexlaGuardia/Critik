name: 'VibeCheck Security Scanner'
description: 'Scan your vibe-coded app for security issues — secrets, injection, auth gaps, config problems'
author: 'Alex LaGuardia'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  path:
    description: 'Path to scan (default: .)'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report: critical, high, medium, low, info'
    required: false
    default: 'info'
  format:
    description: 'Output format: terminal, json'
    required: false
    default: 'terminal'
  fail-on:
    description: 'Fail the action if findings at this severity or above: critical, high, medium, low, none'
    required: false
    default: 'high'

outputs:
  findings:
    description: 'Number of findings'
  critical:
    description: 'Number of critical findings'
  high:
    description: 'Number of high findings'
  exit-code:
    description: 'Scanner exit code (0=clean, 1=findings)'

runs:
  using: 'composite'
  steps:
    - name: Install VibeCheck
      shell: bash
      run: pip install vibecheck-ai

    - name: Run scan
      id: scan
      shell: bash
      run: |
        set +e
        OUTPUT=$(vibecheck scan ${{ inputs.path }} --format json --severity ${{ inputs.severity }} 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT" > /tmp/vibecheck-results.json

        # Parse results
        TOTAL=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['total'])" 2>/dev/null || echo "0")
        CRITICAL=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['critical'])" 2>/dev/null || echo "0")
        HIGH=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['high'])" 2>/dev/null || echo "0")

        echo "findings=$TOTAL" >> $GITHUB_OUTPUT
        echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
        echo "high=$HIGH" >> $GITHUB_OUTPUT
        echo "exit-code=$EXIT_CODE" >> $GITHUB_OUTPUT

        # Print terminal output for logs
        vibecheck scan ${{ inputs.path }} --severity ${{ inputs.severity }}

        # Determine if we should fail
        FAIL_ON="${{ inputs.fail-on }}"
        SHOULD_FAIL=0

        if [ "$FAIL_ON" = "critical" ] && [ "$CRITICAL" -gt 0 ]; then
          SHOULD_FAIL=1
        elif [ "$FAIL_ON" = "high" ] && [ "$EXIT_CODE" -eq 1 ]; then
          SHOULD_FAIL=1
        elif [ "$FAIL_ON" = "medium" ] && [ "$TOTAL" -gt 0 ]; then
          SHOULD_FAIL=1
        elif [ "$FAIL_ON" = "low" ] && [ "$TOTAL" -gt 0 ]; then
          SHOULD_FAIL=1
        fi

        if [ "$SHOULD_FAIL" -eq 1 ]; then
          echo "::error::VibeCheck found $TOTAL security issues ($CRITICAL critical, $HIGH high)"
          exit 1
        fi
