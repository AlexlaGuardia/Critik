# .github/workflows/vibecheck.yml
# Add this to your repo to scan every push and PR

name: VibeCheck Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vibecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install VibeCheck
        run: pip install vibecheck-ai

      - name: Run security scan
        run: vibecheck scan . --format terminal

      # Optional: Upload SARIF for GitHub Code Scanning
      - name: Generate SARIF
        if: always()
        run: vibecheck scan . --format sarif > vibecheck.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: vibecheck.sarif
          category: vibecheck
