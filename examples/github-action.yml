# .github/workflows/critik.yml
# Add this to your repo to scan every push and PR

name: Critik Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  critik:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Critik
        run: pip install critik

      - name: Run security scan
        run: critik scan . --format terminal

      # Optional: Upload SARIF for GitHub Code Scanning
      - name: Generate SARIF
        if: always()
        run: critik scan . --format sarif > critik.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: critik.sarif
          category: critik
