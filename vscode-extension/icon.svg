<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M128 36 L200 68 L200 140 C200 185 165 215 128 228 C91 215 56 185 56 140 L56 68 Z"
        fill="url(#shield)" opacity="0.9"/>

  <!-- Inner shield highlight -->
  <path d="M128 52 L188 78 L188 138 C188 176 158 202 128 213 C98 202 68 176 68 138 L68 78 Z"
        fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>

  <!-- Code brackets < > -->
  <text x="96" y="160" font-family="monospace" font-weight="bold" font-size="72" fill="#ffffff" opacity="0.95">&lt;</text>
  <text x="140" y="160" font-family="monospace" font-weight="bold" font-size="72" fill="#ffffff" opacity="0.95">&gt;</text>

  <!-- Scan line -->
  <line x1="80" y1="170" x2="176" y2="170" stroke="#00ff88" stroke-width="3" opacity="0.7"/>
  <line x1="80" y1="170" x2="176" y2="170" stroke="#00ff88" stroke-width="6" opacity="0.3"/>
</svg>
